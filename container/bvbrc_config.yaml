# BV-BRC Service Configuration for ESMFold Protein Structure Prediction
service:
  id: "ESMFold"
  category: "protein_analysis"
  gui_enabled: true
  public: true
  description: "Predict protein 3D structures from amino acid sequences using Meta's ESMFold"

parameters:
  # Input file - required
  sequences:
    bvbrc_type: "wsfile"
    widget: "workspace_file_selector"
    filter: ["*.fasta", "*.fa", "*.faa"]
    multiple: false
    validation: "fasta_format"
    required: true
    description: "FASTA file containing protein sequences to fold"
    
  output_path:
    bvbrc_type: "folder"
    widget: "workspace_folder_selector"
    required: true
    description: "Output workspace folder for structure files"
    
  output_file_basename:
    bvbrc_type: "string"
    widget: "textbox"
    validation: "no_spaces"
    required: true
    description: "Base name for output files"
    placeholder: "esmfold_results"
    default: "esmfold_results"
    
  # Model parameters
  num_recycles:
    bvbrc_type: "int"
    widget: "slider"
    min: 0
    max: 4
    step: 1
    default: 4
    description: "Number of recycles for structure refinement (0-4)"
    
  chunk_size:
    bvbrc_type: "enum"
    widget: "dropdown"
    options:
      - value: 64
        label: "64 (Low memory usage)"
      - value: 128
        label: "128 (Default)"
      - value: 256
        label: "256 (Higher memory, faster)"
    default: 128
    description: "Chunk size for processing (affects memory usage)"
    
  max_sequence_length:
    bvbrc_type: "int"
    widget: "textbox"
    min: 1
    max: 2000
    default: 1024
    description: "Maximum sequence length to process (longer sequences require more memory)"
    validation: "integer_range"
    
  # Batching options
  batch_sequences:
    bvbrc_type: "bool"
    widget: "checkbox"
    default: true
    description: "Batch short sequences together for faster processing"
    
  max_tokens_per_batch:
    bvbrc_type: "int"
    widget: "textbox"
    default: 1024
    min: 512
    max: 4096
    description: "Maximum tokens per batch when batching sequences"
    conditional:
      show_if: "batch_sequences == true"
    
  # Compute options
  use_gpu:
    bvbrc_type: "bool"
    widget: "checkbox"
    default: true
    description: "Use GPU acceleration if available"
    
  cpu_offload:
    bvbrc_type: "bool"
    widget: "checkbox"
    default: false
    description: "Offload computations to CPU to save GPU memory (slower but uses less GPU)"
    conditional:
      show_if: "use_gpu == true"

# Resource requirements mapping
resources:
  defaults:
    cpu: 8
    memory: "32G"
    runtime: 3600  # 1 hour default
    storage: "10G"
    
  dynamic:
    # Adjust based on parameters
    - condition: "max_sequence_length > 512"
      memory: "48G"
      runtime: 7200  # 2 hours for longer sequences
      
    - condition: "max_sequence_length > 1024"
      memory: "64G"
      runtime: 10800  # 3 hours for very long sequences
      
    - condition: "use_gpu == false"
      cpu: 16
      memory: "64G"
      runtime: 14400  # 4 hours for CPU-only
      
    - condition: "cpu_offload == true"
      memory: "24G"  # Less GPU memory needed

# Output specifications
outputs:
  structures:
    type: "folder"
    description: "Directory containing PDB structure files"
    
  summary:
    type: "file"
    suffix: ".json"
    description: "JSON summary of predictions"
    
  log:
    type: "file"
    suffix: ".log"
    description: "Processing log file"

# Container settings
container:
  type: "docker"
  image: "esmfold:latest"
  mount_workspace: true
  
# Validation rules
validation:
  fasta_format:
    type: "file_content"
    regex: "^>.*\\n[A-Za-z\\n]+$"
    message: "File must be in FASTA format"
    
  no_spaces:
    type: "string"
    regex: "^[^\\s]+$"
    message: "Value cannot contain spaces"
    
  integer_range:
    type: "number"
    message: "Value must be within the specified range"